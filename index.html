<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecord Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    h2 {
      font-size: 1.5rem;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    p {
      max-width: 600px;
      margin: 0 auto 1.5rem auto;
      line-height: 1.5;
      font-size: 1rem;
    }

    .btn-main {
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      transition: background 0.3s ease, transform 0.15s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-main:hover {
      background: linear-gradient(135deg, #22c55e, #38bdf8);
      transform: translateY(-2px);
    }

    .nav-link {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: #9ca3af;
    }

    .nav-link a {
      color: #38bdf8;
      text-decoration: none;
    }

    .nav-link a:hover {
      text-decoration: underline;
    }

    .logo {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <main>
    <h1>
      <img
        class="logo"
        src="https://cdn.discordapp.com/attachments/1487781004637765664/1497317489564975124/copilot_image_1774784193557.jpeg?ex=69ed1514&is=69ebc394&hm=f9b4015353e65b2f3a959e9fa83799172948bd7d3c92b6f1ceb601719e628837"
        alt="Minecord Logo"
      />
      <strong>Minecord Systems</strong>
    </h1>

    <h2>About Minecord Systems:</h2>
    <p>
      Minecord Systems is a Discord bot community made by <strong>@viouniversal</strong>.
    </p>

    <a
      class="btn-main"
      href="https://discord.gg/NXeUTSdgf5"
      target="_blank"
      rel="noopener noreferrer"
    >
      Minecord Systems Discord Server
    </a>

    <div class="nav-link">
      <span>Want to see other servers? </span>
      <a href="advertisements.html">Go to Advertisements page</a>
    </div>
  </main>
</body>
</html>
