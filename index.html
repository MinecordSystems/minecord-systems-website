      <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecord Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image: url('https://cdn.discordapp.com/attachments/1338781863694565429/1497322868751601906/download-32.jpeg?ex=69ed1a16&is=69ebc896&hm=76c8eba8150d42c1c3d3f9c7d7a04846fe5ebb05318baede1807664d55e3dd09');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: #ff7518;
      text-shadow: 0 0 15px #ff4500;
    }

    h2 {
      font-size: 1.5rem;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      color: #ffa94d;
      text-shadow: 0 0 10px #ff6600;
    }

    p {
      max-width: 600px;
      margin: 0 auto 1.5rem auto;
      line-height: 1.5;
      font-size: 1rem;
    }

    .btn-main {
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      background: linear-gradient(135deg, #ff0000, #ff7a00);
      box-shadow: 0 0 15px #ff4500;
      transition: transform 0.15s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-main:hover {
      transform: translateY(-3px);
    }

    .nav-link {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: #ffa94d;
    }

    .nav-link a {
      color: #ff7a00;
      text-decoration: none;
    }

    .nav-link a:hover {
      text-decoration: underline;
    }

    /* Floating Ghosts */
    .ghost {
      position: fixed;
      width: 80px;
      opacity: 0.7;
      animation: floatGhost 8s ease-in-out infinite;
      z-index: 9999;
    }

    .ghost:nth-child(1) { top: 20%; left: -100px; animation-delay: 0s; }
    .ghost:nth-child(2) { top: 50%; left: -120px; animation-delay: 2s; }
    .ghost:nth-child(3) { top: 75%; left: -140px; animation-delay: 4s; }

    @keyframes floatGhost {
      0% { transform: translateX(0) translateY(0); opacity: 0; }
      20% { opacity: 1; }
      50% { transform: translateX(120vw) translateY(-20px); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateX(0) translateY(0); opacity: 0; }
    }

    /* Spider Webs */
    .web {
      position: fixed;
      width: 150px;
      opacity: 0.8;
      z-index: 9998;
    }

    .web.top-left { top: 0; left: 0; }
    .web.top-right { top: 0; right: 0; }
    .web.bottom-left { bottom: 0; left: 0; }
    .web.bottom-right { bottom: 0; right: 0; }
  </style>
</head>
<body>
  <main>
    <h1>🎃 Minecord Systems 🎃</h1>

    <h2>About Minecord Systems:</h2>
    <p>
      Minecord Systems is a Discord bot community made by <strong>@viouniversal</strong>.
    </p>

    <h2>Bots We Have Made:</h2>
    <p>
      • Minecord Systems<br>
      • Event Announcer
    </p>

    <a
      class="btn-main"
      href="https://discord.gg/NXeUTSdgf5"
      target="_blank"
      rel="noopener noreferrer"
    >
      Join Minecord Systems
    </a>

    <div class="nav-link">
      <span>Want to see other servers? </span>
      <a href="advertisements.html">Go to Advertisements page</a>
    </div>
  </main>

  <!-- Floating Ghosts -->
  <img class="ghost" src="https://i.imgur.com/8QxQ2pP.png">
  <img class="ghost" src="https://i.imgur.com/8QxQ2pP.png">
  <img class="ghost" src="https://i.imgur.com/8QxQ2pP.png">

  <!-- Spider Webs -->
  <img class="web top-left" src="https://i.imgur.com/3pQeQ0M.png">
  <img class="web top-right" src="https://i.imgur.com/3pQeQ0M.png">
  <img class="web bottom-left" src="https://i.imgur.com/3pQeQ0M.png">
  <img class="web bottom-right" src="https://i.imgur.com/3pQeQ0M.png">

</body>
</html>
