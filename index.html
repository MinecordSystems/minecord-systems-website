 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minecord Systems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body {
            margin:0;
            font-family: Arial, sans-serif;
            background:#0f172a url('https://cdn.discordapp.com/attachments/1338781863694565429/1497322868751601906/download-32.jpeg') center/cover no-repeat;
            color:#eee;
            text-align:center;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        /* cobweb top-left */
        .cobweb {
            width:140px;
            position:absolute;
            top:0;
            left:0;
            opacity:.9;
            pointer-events:none;
        }

        h1 {
            margin-top:120px;
            font-size:3rem;
            color:#ff7518;
            text-shadow:0 0 12px #ff4500;
        }

        h2 {
            margin:20px 0 10px;
            color:#ffa94d;
            text-shadow:0 0 8px #ff6600;
        }

        p {
            max-width:600px;
            margin:0 auto 20px;
            line-height:1.5;
        }

        .btn-main {
            padding:12px 25px;
            border-radius:999px;
            background:linear-gradient(135deg, red, #ff7a00);
            border:none;
            color:#111;
            font-weight:bold;
            cursor:pointer;
            text-decoration:none;
            box-shadow:0 0 12px #ff4500;
        }

        .btn-main:hover { transform:translateY(-3px); }

        .nav-link { margin-top:25px; color:#ffa94d; }
        .nav-link a { color:#ff7a00; }

        /* chat button */
        .chat-btn {
            position:fixed;
            top:20px;
            right:20px;
            width:55px;
            height:55px;
            border-radius:50%;
            border:none;
            background:#ff7a00;
            font-size:26px;
            cursor:pointer;
            box-shadow:0 0 10px #ff4500;
            z-index:9999;
        }

        /* chat popup */
        .chat-box {
            position:fixed;
            top:90px;
            right:20px;
            width:260px;
            background:#1e1e1e;
            border:2px solid #ff7a00;
            border-radius:10px;
            padding:10px;
            display:none;
            z-index:9999;
        }

        .chat-box textarea {
            width:100%;
            height:120px;
            background:#2b2b2b;
            border:none;
            color:white;
            padding:8px;
            resize:none;
            border-radius:6px;
        }

        .send-btn, .close-btn {
            width:48%;
            padding:8px;
            margin-top:8px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .send-btn { background:#ff7a00; color:black; }
        .close-btn { background:#444; color:white; }

    </style>
</head>

<body>

    <!-- cobweb -->
    <img class="cobweb" src="/attachments/cX5JDM4gtExPKCPe7Xc8F.jpeg">

    <!-- chat button -->
    <button class="chat-btn" onclick="openChatBox()">💬</button>

    <!-- chat popup -->
    <div id="chatBox" class="chat-box">
        <textarea id="chatMessage" placeholder="Type your message..."></textarea>
        <button class="send-btn" onclick="sendEmail()">Send</button>
        <button class="close-btn" onclick="closeChatBox()">Close</button>
    </div>

    <main>
        <h1>🎃 Minecord Systems 🎃</h1>

        <h2>About Minecord Systems:</h2>
        <p>Minecord Systems is a Discord bot community made by <strong>@viouniversal</strong>.</p>

        <h2>Bots We Have Made:</h2>
        <p>• Minecord Systems<br>• Event Announcer</p>

        <a class="btn-main" href="https://discord.gg/NXeUTSdgf5" target="_blank">Join Minecord Systems</a>

        <div class="nav-link">
            Want to see other servers? <a href="advertisements.html">Go to Advertisements page</a>
        </div>
    </main>

<script>
function openChatBox(){
    document.getElementById("chatBox").style.display="block";
}

function closeChatBox(){
    document.getElementById("chatBox").style.display="none";
}

function sendEmail(){
    let msg = document.getElementById("chatMessage").value;
    if(!msg.trim()){
        alert("Please type a message first.");
        return;
    }
    let mail = "mailto:minecordsystems@hotmail.com?subject=Website Message&body=" + encodeURIComponent(msg);
    window.location.href = mail;
    closeChatBox();
}
</script>

</body>
</html>
