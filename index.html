<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecord Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image: url('https://cdn.discordapp.com/attachments/1338781863694565429/1497322868751601906/download-32.jpeg?ex=69ed1a16&is=69ebc896&hm=76c8eba8150d42c1c3d3f9c7d7a04846fe5ebb05318baede1807664d55e3dd09');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Cobweb banner at top */
    .cobweb-top {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      z-index: 9999;
      pointer-events: none;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: #ff7518;
      text-shadow: 0 0 15px #ff4500;
      margin-top: 120px;
    }

    h2 {
      font-size: 1.5rem;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      color: #ffa94d;
      text-shadow: 0 0 10px #ff6600;
    }

    p {
      max-width: 600px;
      margin: 0 auto 1.5rem auto;
      line-height: 1.5;
      font-size: 1rem;
    }

    .btn-main {
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      background: linear-gradient(135deg, #ff0000, #ff7a00);
      box-shadow: 0 0 15px #ff4500;
      transition: transform 0.15s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-main:hover {
      transform: translateY(-3px);
    }

    .nav-link {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: #ffa94d;
    }

    .nav-link a {
      color: #ff7a00;
      text-decoration: none;
    }

    .nav-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Cobweb banner -->
  <img class="cobweb-top" src="/attachments/5etyaBykG55Jp6PKSc5ok.jpeg">

  <main>
    <h1>🎃 Minecord Systems 🎃</h1>

    <h2>About Minecord Systems:</h2>
    <p>
      Minecord Systems is a Discord bot community made by <strong>@viouniversal</strong>.
    </p>

    <h2>Bots We Have Made:</h2>
    <p>
      • Minecord Systems<br>
      • Event Announcer
    </p>

    <a
      class="btn-main"
      href="https://discord.gg/NXeUTSdgf5"
      target="_blank"
      rel="noopener noreferrer"
    >
      Join Minecord Systems
    </a>

    <div class="nav-link">
      <span>Want to see other servers? </span>
      <a href="advertisements.html">Go to Advertisements page</a>
    </div>
  </main>

</body>
</html>
