<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecord Systems – Advertisements</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .btn-ad {
      padding: 0.9rem 1.2rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #f9fafb;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.35);
    }

    .btn-ad:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(239, 68, 68, 0.5);
      opacity: 0.95;
    }

    .footer-text {
      font-size: 0.9rem;
      color: #9ca3af;
      text-align: center;
      margin-top: auto;
      padding-top: 1rem;
      font-style: italic;
    }

    .nav-link {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: #9ca3af;
      text-align: center;
    }

    .nav-link a {
      color: #38bdf8;
      text-decoration: none;
    }

    .nav-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Advertisement For Other Servers:</h1>

  <div class="nav-link">
    <a href="index.html">Back to Minecord Systems home</a>
  </div>

  <div class="buttons-container">
    <a
      class="btn-ad"
      href="https://discord.gg/NXeUTSdgf5"
      target="_blank"
      rel="noopener noreferrer"
    >
      Leonserver
    </a>

    <a
      class="btn-ad"
      href="https://discord.gg/RQXgcHPGN4"
      target="_blank"
      rel="noopener noreferrer"
    >
      INTF Minecraft Server
    </a>

    <a
      class="btn-ad"
      href="https://discord.gg/H7zBcFKNN6"
      target="_blank"
      rel="noopener noreferrer"
    >
      INTF SMP Events &amp; Announcements
    </a>
  </div>

  <div class="footer-text">
    Suggest More @minecordsystems@hotmail.com
  </div>
</body>
</html>
