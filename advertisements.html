<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Advertisements – Minecord Systems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body {
            margin:0;
            font-family: Arial, sans-serif;
            background:#020617 url('https://cdn.discordapp.com/attachments/1338781863694565429/1497322868751601906/download-32.jpeg') center/cover no-repeat;
            color:#eee;
            min-height:100vh;
            padding:20px 10px;
            text-align:center;
            position:relative;
        }

        /* cobweb top-left */
        .cobweb {
            width:140px;
            position:absolute;
            top:0;
            left:0;
            opacity:.9;
            pointer-events:none;
        }

        h1 {
            margin-top:120px;
            font-size:2.2rem;
            color:#ff7518;
            text-shadow:0 0 12px #ff4500;
        }

        .nav-link {
            margin:15px 0 25px;
            color:#ffa94d;
        }

        .nav-link a { color:#ff7a00; }

        .buttons-container {
            max-width:400px;
            margin:0 auto;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .btn-ad {
            padding:12px;
            border-radius:8px;
            background:linear-gradient(135deg, red, #ff7a00);
            color:white;
            text-decoration:none;
            font-weight:bold;
            box-shadow:0 0 10px #ff4500;
        }

        .btn-ad:hover { transform:translateY(-3px); }

        .footer-text {
            margin-top:40px;
            color:#ffa94d;
            font-style:italic;
        }

        /* chat button */
        .chat-btn {
            position:fixed;
            top:20px;
            right:20px;
            width:55px;
            height:55px;
            border-radius:50%;
            border:none;
            background:#ff7a00;
            font-size:26px;
            cursor:pointer;
            box-shadow:0 0 10px #ff4500;
            z-index:9999;
        }

        /* chat popup */
        .chat-box {
            position:fixed;
            top:90px;
            right:20px;
            width:260px;
            background:#1e1e1e;
            border:2px solid #ff7a00;
            border-radius:10px;
            padding:10px;
            display:none;
            z-index:9999;
        }

        .chat-box textarea {
            width:100%;
            height:120px;
            background:#2b2b2b;
            border:none;
            color:white;
            padding:8px;
            resize:none;
            border-radius:6px;
        }

        .send-btn, .close-btn {
            width:48%;
            padding:8px;
            margin-top:8px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .send-btn { background:#ff7a00; color:black; }
        .close-btn { background:#444; color:white; }

    </style>
</head>

<body>

    <!-- cobweb -->
    <img class="cobweb" src="/attachments/cX5JDM4gtExPKCPe7Xc8F.jpeg">

    <!-- chat button -->
    <button class="chat-btn" onclick="openChatBox()">💬</button>

    <!-- chat popup -->
    <div id="chatBox" class="chat-box">
        <textarea id="chatMessage" placeholder="Type your message..."></textarea>
        <button class="send-btn" onclick="sendEmail()">Send</button>
        <button class="close-btn" onclick="closeChatBox()">Close</button>
    </div>

    <h1>🎃 Advertised Servers 🎃</h1>

    <div class="nav-link">
        <a href="index.html">Back to Minecord Systems home</a>
    </div>

    <div class="buttons-container">

        <a class="btn-ad" href="https://discord.gg/4zKKdWK25t" target="_blank">Leonempire</a>
        <a class="btn-ad" href="https://discord.gg/mATTYtc5Wz" target="_blank">Hangout</a>
        <a class="btn-ad" href="https://discord.gg/V36N7n5Cj7" target="_blank">Cosmophorical Programming Studios</a>
        <a class="btn-ad" href="https://discord.gg/EFV6XzAurv" target="_blank">Leonserver</a>
        <a class="btn-ad" href="https://discord.gg/cUg5meqggg" target="_blank">TONY's Dead Server</a>
        <a class="btn-ad" href="https://discord.gg/g6dRnSjEa3" target="_blank">Blazefire Union</a>
        <a class="btn-ad" href="https://discord.gg/RQXgcHPGN4" target="_blank">INTF Minecraft Server</a>
        <a class="btn-ad" href="https://discord.gg/H7zBcFKNN6" target="_blank">INTF SMP Events & Announcements</a>

    </div>

    <div class="footer-text">
        Suggest More @ minecordsystems@hotmail.com
    </div>

<script>
function openChatBox(){
    document.getElementById("chatBox").style.display="block";
}

function closeChatBox(){
    document.getElementById("chatBox").style.display="none";
}

function sendEmail(){
    let msg = document.getElementById("chatMessage").value;
    if(!msg.trim()){
        alert("Please type a message first.");
        return;
    }
    let mail = "mailto:minecordsystems@hotmail.com?subject=Website Message&body=" + encodeURIComponent(msg);
    window.location.href = mail;
    closeChatBox();
}
</script>

</body>
</html>
