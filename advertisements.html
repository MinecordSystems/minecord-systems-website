<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Advertisements – Minecord Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image: url('https://cdn.discordapp.com/attachments/1338781863694565429/1497322868751601906/download-32.jpeg?ex=69ed1a16&is=69ebc896&hm=76c8eba8150d42c1c3d3f9c7d7a04846fe5ebb05318baede1807664d55e3dd09');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #ff7518;
      text-shadow: 0 0 15px #ff4500;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .btn-ad {
      padding: 0.9rem 1.2rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff0000, #ff7a00);
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 15px #ff4500;
    }

    .btn-ad:hover {
      transform: translateY(-3px);
    }

    .nav-link {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: #ffa94d;
      text-align: center;
    }

    .nav-link a {
      color: #ff7a00;
      text-decoration: none;
    }

    .nav-link a:hover {
      text-decoration: underline;
    }

    .footer-text {
      font-size: 0.9rem;
      color: #ffa94d;
      text-align: center;
      margin-top: auto;
      padding-top: 1rem;
      font-style: italic;
    }

    /* Floating Ghosts */
    .ghost {
      position: fixed;
      width: 80px;
      opacity: 0.7;
      animation: floatGhost 8s ease-in-out infinite;
      z-index: 9999;
    }

    .ghost:nth-child(1) { top: 20%; left: -100px; animation-delay: 0s; }
    .ghost:nth-child(2) { top: 50%; left: -120px; animation-delay: 2s; }
    .ghost:nth-child(3) { top: 75%; left: -140px; animation-delay: 4s; }

    @keyframes floatGhost {
      0% { transform: translateX(0) translateY(0); opacity: 0; }
      20% { opacity: 1; }
      50% { transform: translateX(120vw) translateY(-20px); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateX(0) translateY(0); opacity: 0; }
    }

    /* Spider Webs */
    .web {
      position: fixed;
      width: 150px;
      opacity: 0.8;
      z-index: 9998;
    }

    .web.top-left { top: 0; left: 0; }
    .web.top-right { top: 0; right: 0; }
    .web.bottom-left { bottom: 0; left: 0; }
    .web.bottom-right { bottom: 0; right: 0; }
  </style>
</head>
<body>

    <a class="btn-ad" href="https://discord.gg/cUg5meqggg" target="_blank">TONY's Dead Server</a>
    <a class="btn-ad" href="https://discord.gg/g6dRnSjEa3" target="_blank">Blazefire Union</a>
    <a class="btn-ad" href="https://discord.gg/RQXgcHPGN4" target="_blank">INTF Minecraft Server</a>
    <a class="btn-ad" href="https://discord.gg/H7zBcFKNN6" target="_blank">INTF SMP Events & Announcements</a>
